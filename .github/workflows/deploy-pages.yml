name: Deploy to GitHub Pages

on:
  # Publica a cada push no branch principal
  push:
    branches:
      - main
  # Permite disparo manual pela aba Actions
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas uma publicação simultânea, sem cancelar execuções em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato do site
        uses: actions/upload-pages-artifact@v3
        with:
          # O site é estático e mora na raiz do repositório
          path: .

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
